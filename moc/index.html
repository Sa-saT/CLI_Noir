<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>探偵ゲーム Mission1 修正版</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Vue 3 -->
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

  <style>
    /* フェードアニメ */
    .fade {
      transition: opacity 0.8s ease-in-out;
    }
    .fade-hide {
      opacity: 0;
    }
    .fade-show {
      opacity: 1;
    }

    /* 見やすくするテキストスタイル */
    .text-overlay {
      background: rgba(0, 0, 0, 0.5);
      padding: 0.5rem 1rem;
      border-radius: 0.35rem;
    }
  </style>
</head>

<body class="bg-gray-900 text-white h-screen overflow-hidden">

<div id="app" class="flex flex-col h-full">

  <!-- タイトル -->
  <header class="bg-indigo-800 p-4 text-center text-2xl font-bold">
    ミッション1：Edit businesscard.txt
  </header>

  <!-- 上：GUI 背景 / text / パネル -->
  <section class="flex-1 relative bg-gray-700 p-3 overflow-hidden">

    <!-- 背景全体 -->
    <div :class="['absolute inset-0 bg-cover bg-center', fadeClass]"
         :style="`background-image: url('images/mission1.png')`">
    </div>

    <div class="relative z-10 flex h-full">

      <!-- 左GUI -->
      <div class="flex-1 flex flex-col justify-center items-center text-center text-gray-200 space-y-4">

        <!-- 説明テキスト -->
        <div v-if="!showClearEffect"
             class="text-xl font-semibold text-overlay text-white fade-in">
          Look into the <span class="font-bold underline">desk drawer</span> to find businesscard.txt…
        </div>

        <!-- 編集カード -->
        <div v-if="showCard"
             class="bg-gray-800 border-2 border-indigo-500 p-4 rounded shadow-xl w-3/4">
          <h2 class="text-2xl font-bold text-indigo-200 mb-2">
            editing businesscard.txt
          </h2>

          <textarea v-model="cardText"
                    class="w-full h-28 bg-gray-900 text-white p-2"
                    placeholder="Enter card contents…"></textarea>

          <div class="mt-3 flex justify-end space-x-2">
            <button @click="saveCard"
                    class="bg-indigo-600 px-3 py-1 rounded hover:bg-indigo-500">
              Save
            </button>
            <button @click="closeCard"
                    class="bg-gray-600 px-3 py-1 rounded hover:bg-gray-500">
              Close
            </button>
          </div>
        </div>

      </div>

      <!-- 右パネル -->
      <aside class="w-80 bg-gray-800 flex flex-col p-2 space-y-3">

        <!-- 使用可能コマンド -->
        <div class="bg-gray-700 p-2 rounded-lg">
          <h3 class="font-semibold border-b border-gray-600 pb-1">
            Available Commands
          </h3>
          <ul class="text-sm space-y-1 mt-2 text-green-200">
            <li>ls</li>
            <li>cd</li>
            <li>vi / open</li>
            <li class="text-yellow-300 font-bold">git status</li>
            <li class="text-yellow-300 font-bold">git push</li>
            <li class="text-gray-400">grep (later)</li>
            <li class="text-gray-400">awk (later)</li>
          </ul>
        </div>

        <!-- メモ帳 -->
        <div class="bg-gray-700 p-2 rounded-lg flex-1 overflow-auto">
          <h3 class="font-semibold border-b border-gray-600 pb-1">
            Notebook
          </h3>
          <textarea class="w-full h-full mt-2 bg-black text-white p-2 resize-none"
                    placeholder="Write notes…"></textarea>
        </div>

      </aside>

    </div>
  </section>

  <!-- 下：CUI ターミナル -->
  <section class="h-1/3 bg-black font-mono text-sm flex flex-col">

    <!-- ターミナル表示 -->
    <div ref="terminal"
         class="flex-1 overflow-y-auto text-green-400 p-3 space-y-1">
      <template v-for="(line, index) in terminalLines" :key="index">
        <div>{{ line }}</div>
      </template>
    </div>

    <!-- 入力欄 -->
    <div class="border-t border-gray-600">
      <input v-model="inputCommand"
             @keyup.enter="executeCommand"
             placeholder="Enter command… (e.g., ls, cd desk, vi businesscard.txt)"
             class="w-full bg-gray-900 text-green-300 py-2 px-3 focus:outline-none"
      />
    </div>
  </section>
</div>

<script>
const { createApp, nextTick } = Vue;

createApp({
  data() {
    return {
      terminalLines: [
        "Welcome Detective!",
        "Mission1: Edit businesscard.txt",
      ],
      inputCommand: "",
      showCard: false,
      cardText: "",
      showClearEffect: false,
      fadeClass: "fade fade-show",
    };
  },
  methods: {

    executeCommand() {
      const cmd = this.inputCommand.trim();
      if (!cmd) return;

      this.terminalLines.push(`$ ${cmd}`);

      if (cmd === "ls") {
        this.pushOutput("desk/  businesscard.txt");
      }
      else if (cmd === "cd desk") {
        this.pushOutput("Moved into desk directory");
      }
      else if (cmd === "vi businesscard.txt"
            || cmd === "open businesscard.txt") {
        this.pushOutput("Opening businesscard.txt...");
        this.showCard = true;
      }
      else if (cmd === "git status") {
        this.pushOutput("On branch main");
        this.pushOutput("nothing to commit, working tree clean");
      }
      else if (cmd === "git push") {
        this.pushOutput("git push successful!");
        this.onStageClear();
      }
      else {
        this.pushOutput(`${cmd}: command not found`);
      }

      this.inputCommand = "";
    },

    pushOutput(text) {
      this.terminalLines.push(text);
      nextTick(() => {
        const container = this.$refs.terminal;
        container.scrollTop = container.scrollHeight;
      });
    },

    saveCard() {
      this.pushOutput("businesscard.txt saved. (git commit available)");
      this.showCard = false;
    },

    closeCard() {
      this.showCard = false;
    },

    onStageClear() {
      // GUI フェードアウト
      this.fadeClass = "fade fade-hide";

      // 少し待ってからフェードイン
      setTimeout(() => {
        this.fadeClass = "fade fade-show";
        this.terminalLines.push("Returned to root directory.");
      }, 800);
    }
  }
}).mount("#app");
</script>

</body>
</html>
