<!-- @dsCard group="Panels" name="CommandPanel" subtitle="使用可能コマンド一覧 · unlocked / highlight / locked" -->
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CommandPanel — CLI_Noir</title>
<style>
  @import "../../styles.css";
  * { box-sizing: border-box; }
  body {
    margin: 0; padding: var(--space-6);
    background: var(--bg-app); color: var(--text-body);
    font-family: var(--font-ui);
  }
  .panel {
    width: var(--rail-command-w); max-width: 100%;
    background: var(--surface-panel); border: 1px solid var(--border-subtle);
    border-radius: var(--radius-lg); box-shadow: var(--shadow-panel);
    overflow: hidden;
  }
  .panel-head {
    padding: var(--space-3) var(--space-4);
    border-bottom: 1px solid var(--border-subtle);
    font-size: var(--text-sm); font-weight: var(--weight-semibold);
    color: var(--text-heading); letter-spacing: .01em;
  }
  ul { list-style: none; margin: 0; padding: var(--space-2) 0; }
  li {
    display: flex; align-items: center; gap: var(--space-2);
    padding: var(--space-2) var(--space-4);
    font-family: var(--font-mono); font-size: var(--text-sm);
    cursor: default;
  }
  li.unlocked { color: var(--cmd-unlocked); }
  li.unlocked:hover { background: rgba(74,222,128,.08); }
  li.highlight { color: var(--cmd-highlight); font-weight: var(--weight-bold); }
  li.highlight:hover { background: rgba(253,224,71,.08); }
  li.locked { color: var(--cmd-locked); }
  .icon { width: 1em; text-align: center; opacity: .8; }
  .badge {
    margin-left: auto; font-family: var(--font-ui); font-size: var(--text-xs);
    color: var(--text-faint); letter-spacing: var(--tracking-caps);
  }
</style>
</head>
<body>
  <aside class="panel">
    <div class="panel-head">使用可能コマンド</div>
    <ul>
      <li class="unlocked"><span class="icon">›</span>ls</li>
      <li class="unlocked"><span class="icon">›</span>cd</li>
      <li class="unlocked"><span class="icon">›</span>cat</li>
      <li class="highlight"><span class="icon">★</span>git status</li>
      <li class="highlight"><span class="icon">★</span>git push</li>
      <li class="locked"><span class="icon">🔒</span>grep<span class="badge">Lv.3</span></li>
      <li class="locked"><span class="icon">🔒</span>awk<span class="badge">Lv.5</span></li>
    </ul>
  </aside>
</body>
</html>
