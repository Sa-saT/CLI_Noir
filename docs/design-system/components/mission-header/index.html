<!-- @dsCard group="Scene" name="MissionHeader" subtitle="タイトル帯 · 英題 + 日本語副題の2段" -->
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MissionHeader — CLI_Noir</title>
<style>
  @import "../../styles.css";
  * { box-sizing: border-box; }
  body {
    margin: 0; padding: var(--space-6);
    background: var(--bg-app); color: var(--text-body);
    font-family: var(--font-ui);
  }
  .header {
    background: linear-gradient(180deg, var(--indigo-700), var(--indigo-600));
    padding: var(--space-4) var(--space-6);
    border-bottom: 1px solid rgba(0,0,0,.35);
    box-shadow: var(--shadow-panel);
    display: flex; align-items: baseline; justify-content: space-between; gap: var(--space-4);
  }
  .title-wrap { display: flex; flex-direction: column; gap: 2px; }
  .mission-tag {
    font-family: var(--font-mono); font-size: var(--text-xs);
    letter-spacing: var(--tracking-caps); text-transform: uppercase;
    color: var(--indigo-300);
  }
  .mission-title {
    font-family: var(--font-display); font-weight: var(--weight-bold);
    font-size: var(--text-2xl); color: #fff; margin: 0; line-height: var(--leading-tight);
  }
  .mission-sub {
    font-size: var(--text-sm); color: rgba(255,255,255,.8);
  }
  .rank {
    font-family: var(--font-mono); font-size: var(--text-xs);
    letter-spacing: var(--tracking-caps); color: rgba(255,255,255,.75);
    border: 1px solid rgba(255,255,255,.3); border-radius: var(--radius-sm);
    padding: 2px var(--space-2); white-space: nowrap;
  }
</style>
</head>
<body>
  <header class="header">
    <div class="title-wrap">
      <span class="mission-tag">Mission 1</span>
      <h1 class="mission-title">Edit Business Card</h1>
      <span class="mission-sub">依頼人の名刺を書き換えろ</span>
    </div>
    <span class="rank">Lv.1 見習い</span>
  </header>
</body>
</html>
