<!-- @dsCard group="Terminal" name="Prompt" subtitle="local / remote / su で色と表記が変わる" -->
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prompt — CLI_Noir</title>
<style>
  @import "../../styles.css";
  * { box-sizing: border-box; }
  body {
    margin: 0; padding: var(--space-8);
    background: var(--surface-terminal); color: var(--term-fg);
    font-family: var(--font-mono); font-size: var(--text-sm);
    line-height: var(--leading-term); letter-spacing: var(--tracking-term);
    display: flex; flex-direction: column; gap: var(--space-4);
  }
  .line { display: flex; align-items: baseline; gap: .5ch; }
  .caption {
    font-family: var(--font-ui); font-size: var(--text-xs);
    letter-spacing: var(--tracking-caps); text-transform: uppercase;
    color: var(--text-faint);
  }
  .user { color: var(--green-300); }
  .at, .colon, .dollar { color: var(--text-muted); }
  .host-local { color: var(--gray-300); }
  .host-remote { color: var(--yellow-300); }
  .path { color: var(--indigo-300); }
  .caret {
    display: inline-block; width: .6ch; height: 1.1em; margin-left: .3ch;
    background: var(--green-400); box-shadow: var(--shadow-glow-term);
    animation: blink 1.1s step-end infinite; transform: translateY(2px);
  }
  @keyframes blink { 50% { opacity: 0; } }
</style>
</head>
<body>
  <div>
    <div class="caption">local</div>
    <div class="line">
      <span class="user">detective</span><span class="at">@</span><span class="host-local">office</span><span class="colon">:</span><span class="path">/root/desk</span> <span class="dollar">$</span><span class="caret"></span>
    </div>
  </div>
  <div>
    <div class="caption">remote (ssh)</div>
    <div class="line">
      <span class="user">detective</span><span class="at">@</span><span class="host-remote">amusement_park</span><span class="colon">:</span><span class="path">/gate</span> <span class="dollar">$</span>
    </div>
  </div>
  <div>
    <div class="caption">su 中</div>
    <div class="line">
      <span class="user">barman</span><span class="at">@</span><span class="host-local">office</span><span class="colon">:</span><span class="path">/bar</span> <span class="dollar">$</span>
    </div>
  </div>
</body>
</html>
