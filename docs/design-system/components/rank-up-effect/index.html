<!-- @dsCard group="Feedback" name="RankUpEffect" subtitle="辞令カード + 新コマンド解放の点灯 (Phase2)" -->
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RankUpEffect — CLI_Noir</title>
<style>
  @import "../../styles.css";
  * { box-sizing: border-box; }
  body { margin: 0; padding: var(--space-6); background: var(--bg-app); font-family: var(--font-ui);
    display: flex; justify-content: center; }
  .decree {
    width: 460px; max-width: 100%;
    background: linear-gradient(180deg, var(--sepia-100), var(--sepia-300));
    color: var(--sepia-900); border-radius: var(--radius-md);
    box-shadow: var(--shadow-panel); padding: var(--space-6);
    border: 1px solid var(--sepia-500); text-align: center;
  }
  .decree-eyebrow {
    font-size: var(--text-xs); letter-spacing: var(--tracking-caps);
    text-transform: uppercase; color: var(--sepia-700);
  }
  .decree-title {
    font-family: var(--font-display); font-weight: var(--weight-bold);
    font-size: var(--text-2xl); margin: var(--space-2) 0;
  }
  .decree-body { font-size: var(--text-sm); line-height: var(--leading-relaxed); }
  .rank-line { margin: var(--space-4) 0; font-family: var(--font-mono); font-size: var(--text-base); }
  .rank-line b { color: var(--indigo-700); }
  .unlocks {
    display: flex; gap: var(--space-2); justify-content: center; flex-wrap: wrap;
    margin-top: var(--space-4);
  }
  .chip {
    font-family: var(--font-mono); font-size: var(--text-sm);
    padding: var(--space-1) var(--space-3); border-radius: 999px;
    background: var(--gray-900); color: var(--green-400);
    box-shadow: 0 0 10px rgba(74,222,128,.5);
  }
</style>
</head>
<body>
  <div class="decree">
    <div class="decree-eyebrow">辞 令</div>
    <div class="decree-title">昇格</div>
    <p class="decree-body">貴殿の捜査手腕を認め、下記の通り任ずる。</p>
    <div class="rank-line">Lv.2 <b>捜査補</b> → Lv.3 <b>探偵</b></div>
    <p class="decree-body">新たに以下のコマンドが解放された。</p>
    <div class="unlocks">
      <span class="chip">grep</span>
      <span class="chip">find</span>
      <span class="chip">head / tail</span>
    </div>
  </div>
</body>
</html>
