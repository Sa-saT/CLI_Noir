<!-- @dsCard group="Feedback" name="SaveSelectModal" subtitle="再ログイン時の commit(セーブ)一覧選択" -->
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SaveSelectModal — CLI_Noir</title>
<style>
  @import "../../styles.css";
  * { box-sizing: border-box; }
  body { margin: 0; padding: var(--space-6);
    background: var(--bg-app-deep); font-family: var(--font-ui);
    display: flex; justify-content: center; align-items: flex-start; }
  .modal {
    width: 480px; max-width: 100%;
    background: var(--surface-panel); border: 1px solid var(--border-strong);
    border-radius: var(--radius-lg); box-shadow: var(--shadow-panel); overflow: hidden;
  }
  .modal-head {
    padding: var(--space-4) var(--space-5); border-bottom: 1px solid var(--border-subtle);
  }
  .modal-head h2 { margin: 0; font-size: var(--text-lg); color: var(--text-heading); }
  .modal-head p { margin: 4px 0 0; font-size: var(--text-sm); color: var(--text-muted); }
  ul { list-style: none; margin: 0; padding: var(--space-2); }
  li {
    display: flex; align-items: center; gap: var(--space-3);
    padding: var(--space-3); border-radius: var(--radius-md); cursor: pointer;
    border: 1px solid transparent;
  }
  li:hover { background: var(--surface-card); border-color: var(--border-subtle); }
  li.selected { background: rgba(99,102,241,.12); border-color: var(--accent); }
  .hash { font-family: var(--font-mono); font-size: var(--text-sm); color: var(--accent-quiet); }
  .msg { flex: 1; }
  .msg .title { font-size: var(--text-sm); color: var(--text-body); }
  .msg .when { font-size: var(--text-xs); color: var(--text-faint); font-family: var(--font-mono); }
  .latest {
    font-size: var(--text-xs); letter-spacing: var(--tracking-caps);
    color: var(--term-warn); border: 1px solid var(--term-warn);
    border-radius: var(--radius-sm); padding: 1px var(--space-2);
  }
  .modal-foot { padding: var(--space-3) var(--space-5); display: flex; justify-content: flex-end; gap: var(--space-2);
    border-top: 1px solid var(--border-subtle); }
  .btn { font-family: var(--font-ui); font-weight: var(--weight-semibold); font-size: var(--text-sm);
    padding: var(--space-2) var(--space-4); border-radius: var(--radius-md); cursor: pointer; border: 1px solid transparent; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-ghost { background: transparent; color: var(--accent-quiet); }
</style>
</head>
<body>
  <div class="modal">
    <div class="modal-head">
      <h2>セーブを選んで再開</h2>
      <p>Mission 3 — 記録された commit から選択してください</p>
    </div>
    <ul>
      <li class="selected">
        <span class="hash">a1f9c2e</span>
        <span class="msg"><span class="title">桟橋の足跡を照合</span><span class="when">2026-07-05 23:41</span></span>
        <span class="latest">最新</span>
      </li>
      <li>
        <span class="hash">7bd0410</span>
        <span class="msg"><span class="title">ssh amusement_park に接続</span><span class="when">2026-07-05 23:12</span></span>
      </li>
      <li>
        <span class="hash">3e5aa88</span>
        <span class="msg"><span class="title">case_file.sh を実行</span><span class="when">2026-07-05 22:58</span></span>
      </li>
    </ul>
    <div class="modal-foot">
      <button class="btn btn-ghost">最初から</button>
      <button class="btn btn-primary">このセーブで再開</button>
    </div>
  </div>
</body>
</html>
