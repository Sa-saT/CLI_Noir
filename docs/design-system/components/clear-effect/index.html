<!-- @dsCard group="Feedback" name="ClearEffect" subtitle="Mission Complete 演出 (emerald) + 次ミッション導線" -->
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClearEffect — CLI_Noir</title>
<style>
  @import "../../styles.css";
  * { box-sizing: border-box; }
  body { margin: 0; padding: var(--space-6); background: var(--bg-app); font-family: var(--font-ui); }
  .stage {
    position: relative; height: 320px; border-radius: var(--radius-lg); overflow: hidden;
    border: 1px solid var(--border-subtle);
    background: radial-gradient(120% 100% at 50% 40%, rgba(16,185,129,.18), var(--gray-950) 70%);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: var(--space-5); text-align: center;
  }
  .stamp {
    font-family: var(--font-display); font-weight: var(--weight-bold);
    font-size: var(--text-display); color: #6ee7b7;
    letter-spacing: .01em; text-shadow: 0 0 24px rgba(16,185,129,.5);
  }
  .sub { color: #a7f3d0; font-size: var(--text-sm); font-family: var(--font-mono); }
  .cta {
    background: var(--accent); color: #fff; border: none; cursor: pointer;
    font-family: var(--font-ui); font-weight: var(--weight-semibold); font-size: var(--text-base);
    padding: var(--space-3) var(--space-6); border-radius: var(--radius-md);
    box-shadow: var(--shadow-card);
  }
  .cta:hover { background: var(--accent-hover); }
</style>
</head>
<body>
  <div class="stage">
    <div class="stamp">Mission Complete!</div>
    <div class="sub">$ git push — case closed. snapshot saved.</div>
    <button class="cta">Mission 2 へ →</button>
  </div>
</body>
</html>
